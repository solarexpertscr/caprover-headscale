# Headscale configuration for CapRover

# The server address to listen on
server_url: "https://solarassistant.container.solarexperts.cr"

# Listen address for the gRPC server
listen_addr: "0.0.0.0:8080"

# Metrics listen address
metrics_listen_addr: "0.0.0.0:9090"

# Base domain for tailnet (e.g., ts.example.com)
base_domain: "solarassistant.container.solarexperts.cr"

# Disable check for newer versions
disable_check_for_updates: true

# Derive machine key from node public key (recommended)
derive_machine_key: true

# Path to database file
db_type: "sqlite3"
db_path: "/var/lib/headscale/db.sqlite"

# Private key path (will be generated if not present)
private_key_path: "/var/lib/headscale/private.key"

# TLS configuration (CapRover handles termination, so this is disabled here)
tls_letsencrypt_hostname: ""
tls_letsencrypt_listen: ""
tls_cert_path: ""
tls_key_path: ""

# DNS configuration
dns_config:
  base_domain: "solarassistant.container.solarexperts.cr"
  magic_dns: true
  nameservers:
    global:
      - "1.1.1.1"
      - "8.8.8.8"
    split: {}

# ACL settings
acl_policy_path: "/etc/headscale/acl.hujson"

# OIDC authentication (optional, configure via environment variables if needed)
oidc:
  only_start_if_oidc_is_available: false

# Log settings
log:
  format: "text"
  level: "info"

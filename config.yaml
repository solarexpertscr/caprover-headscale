server_url: "https://headscale.container.openforest.net"
listen_addr: "0.0.0.0:8080"
metrics_listen_addr: "0.0.0.0:9090"
base_domain: "container.openforest.net"

disable_check_for_updates: true
derive_machine_key: true

# Database configuration
database:
  type: sqlite
  sqlite:
    path: "/var/lib/headscale/db.sqlite"
    write_ahead_log: true
private_key_path: "/var/lib/headscale/private.key"

# Noise protocol configuration (Required for Headscale 0.28.0+)
noise:
  private_key_path: "/var/lib/headscale/noise_private.key"

# Tailscale IP prefixes (Required)
prefixes:
  v4: "100.64.0.0/10"
  v6: "fd7a:115c:a1e0::/48"
  allocation: sequential

# Updated DNS configuration for Headscale 0.28.0+
# Note: base_domain must be different from server_url to prevent MagicDNS routing conflicts
dns:
  base_domain: "headscale.net"
  magic_dns: true
  nameservers:
    global:
      - "1.1.1.1"
      - "8.8.8.8"

# DERP Configuration (Required in 0.28.0+)
# We enable the embedded DERP server to guarantee a valid DERP map on startup
derp:
  server:
    enabled: true
    region_id: 999
    region_code: "headscale"
    region_name: "Headscale Embedded DERP"
    stun_listen_addr: "0.0.0.0:3478"
    private_key_path: "/var/lib/headscale/derp_server_private.key"
  urls:
    - https://controlplane.tailscale.com/derpmap/default

# Updated Policy configuration for Headscale 0.28.0+
policy:
  path: "/etc/headscale/acl.hujson"

log:
  format: "text"
  level: "info"